<script>
document.addEventListener("DOMContentLoaded", function() {
  var activeCategory = "all";
  function getUrlParam(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }
  function renderConcepts(filter, search) {
    filter = filter || "all";
    search = search || "";
    var grid = document.getElementById("conceptGrid");
    if (!grid || typeof CONCEPTS === "undefined") return;
    var filtered = CONCEPTS;
    if (filter !== "all") filtered = filtered.filter(function(c) { return c.category === filter; });
    if (search) {
      var s = search.toLowerCase();
      filtered = filtered.filter(function(c) {
        return c.name.toLowerCase().indexOf(s) >= 0 || c.summary.toLowerCase().indexOf(s) >= 0 || c.english.toLowerCase().indexOf(s) >= 0;
      });
    }
    grid.innerHTML = filtered.map(function(c) {
      return '<a href="concept.html?id=' + c.id + '" class="concept-card"><h3>' + c.name + '</h3><p style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">' + c.english + '</p><p>' + c.summary + '</p><span class="category-tag">' + c.categoryName + '</span></a>';
    }).join("") || '<p class="text-center" style="grid-column:1/-1;color:var(--text-muted);">娌℃湁鎵惧埌鍖归厤鐨勬蹇?/p>';
  }
  document.querySelectorAll(".filter-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
      this.classList.add("active");
      activeCategory = this.getAttribute("data-category");
      renderConcepts(activeCategory, document.getElementById("searchInput").value);
    });
  });
  document.getElementById("searchInput").addEventListener("input", function() {
    renderConcepts(activeCategory, this.value);
  });
  var catFromUrl = getUrlParam("category");
  if (catFromUrl) {
    var btn = document.querySelector('.filter-btn[data-category="' + catFromUrl + '"]');
    if (btn) btn.click();
  } else {
    renderConcepts();
  }
});
</script>
