<script>
document.addEventListener("DOMContentLoaded", function() {
  var params = new URLSearchParams(window.location.search);
  var conceptId = params.get("id");
  var container = document.getElementById("conceptDetail");
  if (!conceptId || typeof CONCEPTS === "undefined") {
    container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px 0;">йҸҲоҒ…еЈҳйҚ’жӢҢоҮҡе§’еӮҡеә·йҠҶ?/p>';
    return;
  }
  var concept = CONCEPTS.find(function(c) { return c.id === conceptId; });
  if (!concept) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px 0;">йҸҲоҒ…еЈҳйҚ’жӢҢоҮҡе§’еӮҡеә·йҠҶ?/p>';
    return;
  }
  document.title = concept.name + " - еЁҲеһ«жЎҲйӘһе……зҺҜйҚҠе…је§Үз’§еӢ¬вӮ¬жҝҮе…Ӯжҗҙ?;
  var html = '<div class="breadcrumb"><a href="index.html">жЈЈж ӯгҖү</a> / <a href="concepts.html">е§’еӮҡеә·</a> / ' + concept.name + '</div>';
  html += '<h1 style="font-family:var(--font-serif);font-size:28px;color:var(--primary);margin-bottom:4px;">' + concept.name + '</h1>';
  html += '<p style="color:var(--text-muted);font-size:14px;margin-bottom:8px;">' + concept.english + '</p>';
  html += '<span class="category-tag" style="margin-bottom:24px;display:inline-block;">' + concept.categoryName + '</span>';
  html += '<div style="background:var(--bg-dark);padding:20px;border-radius:var(--radius-lg);margin-bottom:32px;"><p style="font-size:16px;line-height:1.8;margin:0;">' + concept.description + '</p></div>';
  if (concept.quotes && concept.quotes.length > 0) {
    html += '<h2>йҚҳзҶёжһғеҜ®жӣ ж•Ө</h2>';
    concept.quotes.forEach(function(q) {
      html += '<div class="quote-card"><div class="quote-text">"' + q.text + '"</div><div class="quote-source">йҲҘж–әвӮ¬?' + q.source + 'й”ӣ? + q.year + 'й”ӣ?/div></div>';
    });
  }
  if (concept.timeline && concept.timeline.length > 0) {
    html += '<h2 style="margin-top:32px;">йҺ¬жҝҮе…Ӯе©•ж—Үз№ҳ</h2><div class="timeline">';
    concept.timeline.forEach(function(t) {
      html += '<div class="timeline-item"><div class="timeline-year">' + t.year + '</div><div class="timeline-content">' + t.event + '</div></div>';
    });
    html += '</div>';
  }
  if (concept.related && concept.related.length > 0) {
    html += '<h2 style="margin-top:32px;">йҚҸе® д»Ҳе§’еӮҡеә·</h2><div class="concept-grid">';
    concept.related.forEach(function(rid) {
      var related = CONCEPTS.find(function(c) { return c.id === rid; });
      if (related) {
        html += '<a href="concept.html?id=' + related.id + '" class="concept-card"><h3>' + related.name + '</h3><p>' + related.summary + '</p><span class="category-tag">' + related.categoryName + '</span></a>';
      }
    });
    html += '</div>';
  }
  container.innerHTML = html;
});
</script>
