<script>
document.addEventListener("DOMContentLoaded", function() {
  function renderTimeline(filter) {
    filter = filter || "all";
    var container = document.getElementById("timelineContainer");
    if (!container || typeof TIMELINE_EVENTS === "undefined") return;
    var events = TIMELINE_EVENTS;
    if (filter !== "all") events = events.filter(function(e) { return e.type === filter; });
    container.innerHTML = events.map(function(e) {
      return '<div class="timeline-item"><div class="timeline-year">' + e.year + ' <span class="category-tag" style="margin-left:8px;">' + e.type + '</span></div><div class="timeline-content"><strong>' + e.title + '</strong></div><div class="timeline-content">' + e.description + '</div></div>';
    }).join("");
  }
  document.querySelectorAll("#timelineFilter .filter-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll("#timelineFilter .filter-btn").forEach(function(b) { b.classList.remove("active"); });
      this.classList.add("active");
      renderTimeline(this.getAttribute("data-type"));
    });
  });
  renderTimeline();
});
</script>
